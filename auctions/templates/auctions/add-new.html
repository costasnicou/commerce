{% extends "auctions/layout.html" %}
{% block title %}Auctions - Add New Listing{% endblock %}

{% block main %}

    <main class="main">
        <div class="add-new-wraper">
            <h1>Add New Listing</h1>
           
             <form action="" class="add-new-listing-form" method="POST">
                {% csrf_token %}
                <div class="form-group">          
                    {{form.title}}
                </div>

                <div class="form-group">             
                    {{form.description}}
                </div>

                <div class="form-group">
                                   
                    {{form.starting_bid}}
                </div>

                <div class="form-group">
                         
                    {{form.image_url}}
                </div>

                <div class="form-group">
                   
                  
                    {{form.category}}
                </div>

                
                <input type="submit" value="Save">
              
               
            </form>
  

        </div>
    </main>
       
{% endblock %}
